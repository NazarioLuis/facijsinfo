<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  >

  <meta
    name="theme-color"
    content="#000000"
  >

  <meta
    name="mobile-web-app-capable"
    content="yes"
  >

  <title>Cartelera TV</title>

  <link
    rel="manifest"
    href="./manifest.json"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      position: relative;
      font-family: Arial, Helvetica, sans-serif;
    }

    #appFrame {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      border: 0;
      background: #000;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      color: #fff;
      background: #000;
      font-size: clamp(22px, 3vw, 40px);
      text-align: center;
      transition: opacity 400ms ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #error {
      position: fixed;
      left: 20px;
      right: 20px;
      bottom: 20px;
      z-index: 30;
      display: none;
      padding: 14px;
      border-radius: 8px;
      color: #fff;
      background: rgba(160, 0, 0, 0.9);
      text-align: center;
    }

    #error.visible {
      display: block;
    }
  </style>
</head>

<body>
  <div id="loading">
    Cargando cartelera…
  </div>

  <div id="error">
    No se pudo cargar la cartelera.
  </div>

  <iframe
    id="appFrame"
    title="Cartelera digital"
    src="https://script.google.com/macros/s/AKfycbw6hA6je75o-q26GLtF6K-nBTxMjju169-YfyOK9AeJtOpvV5sXAnTOydEAKp-uVrffYQ/exec"
    allow="autoplay; fullscreen; encrypted-media"
    allowfullscreen
  ></iframe>

  <script>
    'use strict';

    const APP_URL =
      'https://script.google.com/macros/s/AKfycbw6hA6je75o-q26GLtF6K-nBTxMjju169-YfyOK9AeJtOpvV5sXAnTOydEAKp-uVrffYQ/exec';

    const frame =
      document.getElementById('appFrame');

    const loading =
      document.getElementById('loading');

    const errorMessage =
      document.getElementById('error');

    let loadTimeout = null;

    frame.addEventListener(
      'load',
      function () {
        clearTimeout(loadTimeout);

        loading.classList.add(
          'hidden'
        );

        errorMessage.classList.remove(
          'visible'
        );
      }
    );

    startLoadTimeout();

    document.addEventListener(
      'keydown',
      function (event) {
        if (
          event.key === 'r' ||
          event.key === 'R'
        ) {
          event.preventDefault();
          reloadApplication();
          return;
        }

        if (
          event.key === 'f' ||
          event.key === 'F'
        ) {
          event.preventDefault();
          requestFullscreen();
        }
      }
    );

    function reloadApplication() {
      loading.classList.remove(
        'hidden'
      );

      errorMessage.classList.remove(
        'visible'
      );

      frame.src =
        APP_URL +
        '?reload=' +
        Date.now();

      startLoadTimeout();
    }

    function startLoadTimeout() {
      clearTimeout(loadTimeout);

      loadTimeout = setTimeout(
        function () {
          loading.classList.add(
            'hidden'
          );

          errorMessage.classList.add(
            'visible'
          );
        },
        30000
      );
    }

    function requestFullscreen() {
      const element =
        document.documentElement;

      if (!element.requestFullscreen) {
        return;
      }

      element
        .requestFullscreen()
        .catch(
          function (error) {
            console.warn(
              'No se pudo activar pantalla completa:',
              error
            );
          }
        );
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener(
        'load',
        function () {
          navigator.serviceWorker
            .register('./service-worker.js')
            .catch(
              function (error) {
                console.warn(
                  'No se pudo registrar el service worker:',
                  error
                );
              }
            );
        }
      );
    }
  </script>
</body>
</html>
